spring:
  application:
    name: blockendcall-backend

  datasource:
    url: jdbc:postgresql://localhost:5432/blockendcall
    username: ${DB_USER:blockendcall}
    password: ${DB_PASS:blockendcall123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}
      timeout: 2000ms

  cache:
    type: redis
    redis:
      time-to-live: 300000  # 5 minutes

server:
  port: 8080
  error:
    # Avoid leaking internal exception detail to clients. Binding (validation) errors
    # are safe to surface; raw exception messages are not.
    include-message: on_param
    include-binding-errors: always

security:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000  # 24h in ms

app:
  report:
    threshold: 5  # reports needed to auto-block a number

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
